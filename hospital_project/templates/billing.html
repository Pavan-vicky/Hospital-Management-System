<!DOCTYPE html>
<html>
<head>
    <title>Billing System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<style>
body {
    margin: 0;
    font-family: "Times New Roman", serif;
    background: url('/static/bg.jpg') no-repeat center center fixed;
    background-size: cover;
}

.container {
    background: rgba(0,0,0,0.7);
    padding: 20px;
    border-radius: 10px;
    color: white;
    margin-top: 20px;
}

h2 {
    font-weight: bold;
    text-align: center;
    color: darkblue;
}

th {
    text-align: center;
    background: #198754;
    color: white;
}

td {
    text-align: center;
}

/* STATUS COLORS */
.paid {
    color: lightgreen;
    font-weight: bold;
}

.pending {
    color: red;
    font-weight: bold;
}
</style>

<body class="p-3">

<h2>Billing System</h2>

<div class="container">

<!-- ADD BILL FORM -->
<form method="POST" action="/add_bill" class="mb-4">

    <select name="patient_id" required>
        <option value="">Select Patient</option>
        {% for p in patients %}
        <option value="{{ p[0] }}">{{ p[1] }}</option>
        {% endfor %}
    </select>

    <input type="number" name="amount" placeholder="Total Amount" required>

    <select name="status">
        <option value="Paid">Paid</option>
        <option value="Pending">Pending</option>
    </select>

    <button class="btn btn-success btn-sm">Add Bill</button>
</form>

<!-- BILL TABLE -->
<table class="table table-bordered bg-white text-dark">
    <tr>
        <th>ID</th>
        <th>Patient</th>
        <th>Amount</th>
        <th>Status</th>
        <th>Date</th>
        <th>Action</th>
    </tr>

    {% for b in bills %}
    <tr>
        <td>{{ b[0] }}</td>
        <td>{{ b[1] }}</td>
        <td>₹{{ b[2] }}</td>

        <td>
            {% if b[3] == "Paid" %}
                <span class="paid">Paid</span>
            {% else %}
                <span class="pending">Pending</span>
            {% endif %}
        </td>

        <td>{{ b[4] }}</td>

        <td>
            <a href="/download_bill/{{ b[0] }}" class="btn btn-primary btn-sm">
                Download
            </a>

            <a href="/delete_bill/{{ b[0] }}" class="btn btn-danger btn-sm">
                Delete
            </a>
        </td>
    </tr>
    {% endfor %}
</table>

</div>

</body>
</html>
