<!DOCTYPE html>
<html>
<head>
<title>Patients</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: "Times New Roman", serif;
    background: url('/static/bg.jpg') no-repeat center center fixed;
    background-size: cover;
}

/* MAIN CONTAINER */
.container-box {
    width: 90%;
    margin: 30px auto;
    background: rgba(0,0,0,0.7);
    padding: 20px;
    border-radius: 10px;
    color: white;
}

/* HEADING */
h2 {
    text-align: center;
    color: #0d6efd;
    font-weight: bold;
    margin-bottom: 20px;
}

/* TABLE */
table {
    background: white;
    color: black;
    border-radius: 10px;
    overflow: hidden;
}

/* HEADER */
th {
    text-align: center;
    font-weight: bold;
}

/* DATA */
td {
    text-align: center;
}

/* BUTTONS */
.btn-warning {
    background-color: #0d6efd;
    border: none;
    color: white;
}

.btn-warning:hover {
    background-color: #0b5ed7;
}
</style>

</head>

<body>

<div class="container-box">

    <h2>Patients List</h2>

    <a href="/" class="btn btn-secondary mb-3">⬅ Back</a>

    <table class="table table-bordered">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Age</th>
            <th>Gender</th>
            <th>Action</th>
        </tr>

        {% for p in patients %}
        <tr>
            <td>{{ p[0] }}</td>
            <td>{{ p[1] }}</td>
            <td>{{ p[2] }}</td>
            <td>{{ p[3] }}</td>
            <td>
                <a href="/delete_patient/{{ p[0] }}" class="btn btn-danger btn-sm">Delete</a>
                <a href="/edit_patient/{{ p[0] }}" class="btn btn-warning btn-sm">Edit</a>
            </td>
        </tr>
        {% endfor %}

    </table>

</div>

</body>
</html>
