<!DOCTYPE html>
<html>
<head>

    <title>Login - Hospital System</title>

    <style>
        body {
            margin: 0;
            font-family: "Times New Roman", serif;

            /* ✅ YOUR IMAGE */
            background: url('/static/login bg.jpg') no-repeat center center fixed;
            background-size: cover;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            width: 320px;
            border-radius: 12px;
            text-align: center;

            box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }

        h2 {
            margin-bottom: 20px;
            font-weight: bold;
            color: darkblue;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-family: "Times New Roman", serif;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #198754;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #145c32;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2> Nature Login</h2>

    <form method="POST" action="/login_check">

        <input type="text" name="username" placeholder="Enter Username" required>

        <input type="password" name="password" placeholder="Enter Password" required>

        <button type="submit">Login</button>

    </form>
</div>


</body>
</html>
